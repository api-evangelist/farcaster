aid: farcaster
name: Farcaster
description: Farcaster is a decentralised social protocol built on Snapchain, an append-only
  state machine that stores casts, reactions, follows, and user profile data. The
  protocol publishes a Hub / Snapchain reference implementation, the Mini Apps SDK
  (formerly Frames) for distributing interactive apps inside Farcaster feeds, Sign
  In with Farcaster (SIWF) for authentication, and AuthKit for React-based sign-in.
  The Warpcast client (now rebranded Farcaster app at farcaster.xyz) is the primary
  consumer surface. Indexer providers such as Neynar host scaled Hub APIs and value-added
  read / write / webhook APIs at api.neynar.com.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
access: 3rd-Party
position: Producer
created: '2026-05-23'
modified: '2026-05-23'
